<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="badge">
          <span class="badge-dot"></span>
          Рулон трекер
        </div>
        <h1>Твой <span>заработок</span><br />за день</h1>
        <p class="subtitle">Введи метры — сразу увидишь сколько сом</p>
      </div>

      <div class="rate-box">
        <span class="rate-label">Цена за 1 метр</span>
        <div class="rate-right">
          <input
            type="text"
            id="rate"
            value="1.50"
            step="0.01"
            min="0"
            inputmode="decimal"
          />
          <span class="rate-unit">сом</span>
        </div>
      </div>

      <div class="input-label">Метры рулонов</div>
      <div class="textarea-wrap">
        <textarea
          id="meters"
          placeholder="45.6 65.4 90.8"
          inputmode="decimal"
        ></textarea>
      </div>
      <div class="hint">Вводи через пробел · пример: 45.6 65.4 90.8</div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Метров</div>
          <div class="metric-value" id="total-m">—</div>
        </div>
        <div class="metric big">
          <div class="metric-label">Заработок</div>
          <div class="metric-value violet" id="total-s">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Рулонов</div>
          <div class="metric-value" id="count">—</div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Метры</th>
              <th>Сом</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="3" class="empty">Введи метры выше ↑</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="2" id="tfoot-m"></td>
              <td id="tfoot-s"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
